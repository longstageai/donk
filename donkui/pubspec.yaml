name: donk
description: "donk"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  window_manager: ^0.5.1
  tray_manager: ^0.2.3
  go_router: ^16.2.5
  path: ^1.9.1
  path_provider: ^2.1.5
  get: ^4.7.2
  flutter_smart_dialog: ^4.9.8+9
  flutter_markdown: ^0.7.6
  encrypt: ^5.0.3
  crypto: ^3.0.6
  qr_flutter: ^4.1.0
  http: ^1.2.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  #http 请求生成
  retrofit_generator: '>=8.0.0 <10.0.0' # for Dart 3.3 use ^9.0.0
  build_runner: ^2.3.3
  json_serializable: ^6.8.0
  msix: ^3.16.12
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true
  assets:
    - assets/img/
  fonts:
    - family: SourceHanSansSC
      fonts:
        - asset: assets/fonts/SourceHanSansSC-Regular.otf
          weight: 400
        - asset: assets/fonts/SourceHanSansSC-Medium.otf
          weight: 500
        - asset: assets/fonts/SourceHanSansSC-Bold.otf
          weight: 700
